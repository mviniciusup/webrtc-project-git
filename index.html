<!DOCTYPE html>
<html>
<head>
    <title>WebRTC Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="icon" type="image/png" href="media/chat.ico">
</head>
<body>
    
    <div class="container">

        <div class="video-container">

            <div class="botao-iniciar-video">

                <button id="start-video">
                    <img width="30px" src="media/video.svg" alt="Phone Call">
                </button>

            </div>

            <div class="container-camera">

                <audio id="remoteAudio" autoplay></audio>
                
                <div class="moldura-video">
                    <video id="localVideo" autoplay muted playsinline></video>
                </div>

                <div class="moldura-audio">
                    <canvas id="wave" width="120" height="120"></canvas>
                </div>
                
            </div>

                <video id="remoteVideo" autoplay playsinline></video>

        </div>


        <div class="message-container">

            <div id="message-box">
                <!--MENSAGENS-->
            </div>

            <div class="input-area">

                <input id="messageInput" type="text" autocomplete="off" autofocus>
                <button onclick="sendMessage()">
                    <svg xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    fill="white"
                    viewBox="0 0 24 24">
                    <path d="M2 21l21-9L2 3v7l15 2-15 2z"/>
                    </svg>
                </button>

            </div>

        </div>

    </div>
    
    <audio id="notificacao" src="./media/notification.wav"></audio>

<script src="app.js"></script>
</body>
</html>
